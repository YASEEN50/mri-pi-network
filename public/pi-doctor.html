<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MRI — تفاصيل الطبيب</title>
  <link rel="stylesheet" href="/pi-shell.css" />
</head>
<body class="pi-app">
  <header class="pi-header">
    <a class="back" href="/pi-doctors.html">←</a>
    <h1>تفاصيل الطبيب</h1>
  </header>
  <main class="pi-main" id="main">
    <div class="pi-loading">جاري التحميل...</div>
  </main>
  <nav class="pi-nav" id="pi-nav"></nav>
  <script src="/pi-shell.js"></script>
  <script>
  var doctorId = new URLSearchParams(location.search).get('id')
  if (!doctorId) location.href = '/pi-doctors.html'

  PiApp.requireSession().then(function (s) {
    if (!s) return
    PiApp.renderNav('doctors', s.user.role)

    PiApp.api('/api/doctors/' + doctorId).then(function (res) {
      var d = res.success && res.data ? res.data : null
      if (!d) throw new Error('الطبيب غير موجود')
      document.getElementById('main').innerHTML =
        '<div class="pi-card" style="text-align:center">' +
          (d.avatarUrl ? '<img class="pi-avatar" src="' + PiApp.esc(d.avatarUrl) + '" alt="" />' : '') +
          '<h2 style="margin:0;color:#fff">د. ' + PiApp.esc(d.firstName + ' ' + d.lastName) + '</h2>' +
          '<p class="pi-muted">' + PiApp.esc(d.specialization || '') + '</p>' +
          (d.city ? '<p class="pi-muted">' + PiApp.esc(d.city) + '</p>' : '') +
          (d.averageRating ? '<p>⭐ ' + d.averageRating.toFixed(1) + ' (' + (d.totalReviews || 0) + ' تقييم)</p>' : '') +
        '</div>' +
        (d.bio ? '<div class="pi-card"><h2>نبذة</h2><p class="pi-muted">' + PiApp.esc(d.bio) + '</p></div>' : '') +
        '<div class="pi-card">' +
          '<p class="pi-muted">رسوم الاستشارة: <strong style="color:#34d399">' + (d.consultationFee || '—') + ' π</strong></p>' +
          '<p class="pi-muted">سنوات الخبرة: ' + (d.yearsOfExperience || '—') + '</p>' +
        '</div>' +
        '<p class="pi-muted">لحجز موعد كامل، تواصل مع الطبيب عبر المنصة. ميزة الحجز المباشر قريباً في Pi.</p>' +
        '<a class="pi-btn pi-btn-primary" href="/pi-doctors.html">← العودة للأطباء</a>'
    }).catch(function (e) {
      document.getElementById('main').innerHTML = '<p class="pi-err">' + PiApp.esc(e.message) + '</p>'
    })
  })
  </script>
</body>
</html>
