<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="med-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0A66C2" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Soft ambient washes at corners -->
  <circle cx="140" cy="130" r="120" fill="url(#med-glow)" opacity="0.5"/>
  <circle cx="1060" cy="130" r="100" fill="url(#med-glow)" opacity="0.45"/>
  <circle cx="130" cy="670" r="110" fill="url(#med-glow)" opacity="0.45"/>
  <circle cx="1070" cy="670" r="130" fill="url(#med-glow)" opacity="0.5"/>

  <g stroke="#5eb8ff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" opacity="0.72">
    <!-- ECG — top left -->
    <path d="M60 100h40l12 24 14-48 14 36 18-12h44"/>
    <circle cx="60" cy="100" r="4" fill="#00D4FF" stroke="none" opacity="0.8"/>

    <!-- Medical cross — top right -->
    <circle cx="1080" cy="95" r="46"/>
    <path d="M1080 72v46M1057 95h46" stroke-width="2"/>

    <!-- MRI ring — bottom right -->
    <circle cx="1050" cy="680" r="70"/>
    <circle cx="1050" cy="680" r="46" opacity="0.65"/>
    <path d="M980 680h24M1096 680h24M1050 610v24M1050 746v24"/>
    <rect x="1010" y="758" width="80" height="12" rx="4" opacity="0.55"/>

    <!-- Stethoscope — bottom left -->
    <circle cx="120" cy="660" r="20"/>
    <path d="M120 640c-6-30 16-54 40-54s48 24 42 54"/>
    <path d="M160 604c24 0 42 18 42 42 0 16-8 30-22 36"/>
    <circle cx="202" cy="686" r="9"/>
    <circle cx="226" cy="686" r="9"/>
    <path d="M202 677v-12c0-10 8-18 18-18"/>

    <!-- Heart + pulse — left -->
    <path d="M70 380c0-20 16-32 30-32 10 0 18 6 24 16 6-10 14-16 24-16 14 0 30 12 30 32 0 28-54 52-54 52s-54-24-54-52z" fill="#0A66C2" fill-opacity="0.12" stroke="#5eb8ff"/>
    <path d="M36 470h32l8 16 12-30 10 22 14-8h34" opacity="0.55"/>

    <!-- DNA helix hint — right -->
    <path d="M1100 340c-20 24-20 56 0 80M1120 340c20 24 20 56 0 80" opacity="0.45"/>
    <path d="M1100 360h20M1100 400h20M1100 440h20" opacity="0.35"/>
  </g>
</svg>
