<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>إنشاء حساب — MRI</title>
  <style>
    body { margin:0; padding:24px; background:#0f172a; color:#e2e8f0; font-family:Arial,Tahoma,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { width:100%; max-width:420px; background:#1e293b; border-radius:16px; padding:28px 22px; }
    h1 { font-size:1.2rem; color:#fff; margin:0 0 16px; text-align:center; }
    label { display:block; font-size:0.8rem; color:#94a3b8; margin-bottom:4px; }
    input, select { width:100%; padding:12px; margin-bottom:14px; border-radius:8px; border:1px solid #475569; background:#0f172a; color:#fff; font-size:1rem; box-sizing:border-box; }
    .btn { width:100%; padding:14px; border-radius:10px; border:none; font-size:1rem; font-weight:600; cursor:pointer; background:#059669; color:#fff; }
    .link { display:block; text-align:center; margin-top:14px; color:#94a3b8; font-size:0.85rem; text-decoration:none; }
    .err { color:#f87171; font-size:0.8rem; margin-top:10px; text-align:center; }
    .ok { color:#34d399; font-size:0.85rem; margin-top:10px; text-align:center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>إنشاء حساب جديد</h1>
    <form id="form">
      <label for="email">البريد الإلكتروني</label>
      <input id="email" type="email" required dir="ltr" />
      <label for="password">كلمة المرور</label>
      <input id="password" type="password" required minlength="8" dir="ltr" />
      <label for="role">نوع الحساب</label>
      <select id="role">
        <option value="CLIENT">مريض / عميل</option>
        <option value="DOCTOR">طبيب</option>
        <option value="FACILITY">منشأة طبية</option>
      </select>
      <button class="btn" type="submit" id="submitBtn">إنشاء الحساب</button>
    </form>
    <p id="msg"></p>
    <a class="link" href="/pi-email.html">لديك حساب؟ سجّل الدخول</a>
    <a class="link" href="/">← الرئيسية</a>
  </div>
  <script>
  document.getElementById('form').addEventListener('submit', function (e) {
    e.preventDefault()
    var btn = document.getElementById('submitBtn')
    var msg = document.getElementById('msg')
    msg.className = ''
    msg.textContent = ''
    btn.disabled = true
    btn.textContent = 'جاري الإنشاء...'
    fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value,
      }),
    })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d } }) })
      .then(function (res) {
        if (!res.ok) throw new Error(res.d.message || res.d.error || 'فشل التسجيل')
        msg.className = 'ok'
        msg.textContent = 'تم إنشاء الحساب! تحقق من بريدك ثم سجّل الدخول.'
        setTimeout(function () { window.location.href = '/pi-email.html' }, 2500)
      })
      .catch(function (ex) {
        msg.className = 'err'
        msg.textContent = ex.message || 'حدث خطأ'
        btn.disabled = false
        btn.textContent = 'إنشاء الحساب'
      })
  })
  </script>
</body>
</html>
