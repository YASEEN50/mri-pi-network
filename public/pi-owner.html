<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MRI — لوحة الإدارة</title>
  <link rel="stylesheet" href="/pi-shell.css" />
</head>
<body class="pi-app">
  <header class="pi-header">
    <a class="back" href="/pi-app.html">←</a>
    <h1>لوحة الإدارة</h1>
  </header>
  <main class="pi-main" id="main">
    <div class="pi-loading">جاري التحميل...</div>
  </main>
  <nav class="pi-nav" id="pi-nav"></nav>
  <script src="/pi-shell.js"></script>
  <script>
  PiApp.requireSession().then(function (session) {
    if (!session) return
    var role = session.user.role
    if (role !== 'OWNER' && role !== 'ADMIN') {
      window.location.href = '/pi-app.html'
      return
    }
    PiApp.renderNav('admin', role)

    PiApp.api('/api/admin/stats').then(function (res) {
      var s = res.success ? res.data : null
      var main = document.getElementById('main')
      if (!s) throw new Error('تعذر تحميل الإحصائيات')

      main.innerHTML =
        '<div class="pi-card">' +
          '<p class="pi-muted">مرحباً ' + PiApp.esc(session.user.email || 'مؤسس') + '</p>' +
          '<div class="pi-stat-grid">' +
            stat('👥', s.totalUsers, 'مستخدم') +
            stat('👨‍⚕️', s.totalDoctors, 'طبيب') +
            stat('🏥', s.totalFacilities, 'منشأة') +
            stat('📅', s.totalAppointments, 'موعد') +
            stat('⏳', s.pendingDoctors, 'أطباء معلّقين') +
            stat('⏳', s.pendingFacilities, 'منشآت معلّقة') +
          '</div>' +
        '</div>' +
        '<a class="pi-btn pi-btn-primary" href="/pi-profile.html">👤 الملف الشخصي</a>' +
        '<a class="pi-btn pi-btn-secondary" href="/pi-doctors.html">👨‍⚕️ الأطباء</a>'

      function stat(icon, val, label) {
        return '<div class="pi-stat"><span style="font-size:1.2rem">' + icon + '</span><strong>' + (val ?? 0) + '</strong><small>' + label + '</small></div>'
      }
    }).catch(function (e) {
      document.getElementById('main').innerHTML =
        '<p class="pi-err">' + PiApp.esc(e.message) + '</p>' +
        '<a class="pi-btn pi-btn-secondary" href="/pi-profile.html">الملف الشخصي</a>'
    })
  })
  </script>
</body>
</html>
