<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <title>MRI — منصة طبية</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 32px 24px;
      text-align: center;
    }
    .logo {
      width: 64px; height: 64px;
      margin: 0 auto 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, #059669, #10b981);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: #fff;
    }
    h1 { font-size: 1.5rem; color: #fff; margin-bottom: 8px; }
    p { font-size: 0.9rem; color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .note { font-size: 0.75rem; color: #64748b; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">π</div>
    <h1>MRI</h1>
    <p>منصة طبية موثوقة — مُحسَّنة للعمل داخل Pi Browser</p>
    <a class="btn btn-primary" href="/pi-login.html">تسجيل الدخول بـ Pi Network</a>
    <a class="btn btn-secondary" href="/login">الدخول بالبريد الإلكتروني</a>
    <p class="note">إذا لم تظهر الصفحة الكاملة، استخدم هذا الرابط الخفيف.</p>
  </div>
</body>
</html>
