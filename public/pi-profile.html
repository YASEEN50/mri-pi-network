<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MRI — الملف الشخصي</title>
  <link rel="stylesheet" href="/pi-shell.css" />
</head>
<body class="pi-app">
  <header class="pi-header">
    <a class="back" href="/pi-app.html">←</a>
    <h1>الملف الشخصي</h1>
  </header>
  <main class="pi-main" id="main">
    <div class="pi-loading">جاري التحميل...</div>
  </main>
  <nav class="pi-nav" id="pi-nav"></nav>
  <script src="/pi-shell.js"></script>
  <script>
  var sessionData = null
  var profileData = {}

  function renderForm() {
    var u = sessionData.user
    var role = u.role
    PiApp.renderNav('profile', role)
    var main = document.getElementById('main')

    if (role === 'OWNER' || role === 'ADMIN') {
      main.innerHTML =
        '<div class="pi-card">' +
          '<h2>معلومات الحساب</h2>' +
          '<p class="pi-muted">البريد: ' + PiApp.esc(u.email) + '</p>' +
          '<p class="pi-muted">الدور: ' + PiApp.esc(PiApp.roleLabel(role)) + '</p>' +
        '</div>' +
        '<a class="pi-btn pi-btn-primary" href="/pi-owner.html">⚙️ لوحة الإدارة</a>' +
        renderPasswordSection()
      return
    }

    var p = profileData
    var healthFields = role === 'CLIENT' ? (
      '<label class="pi-label">فصيلة الدم</label><input class="pi-input" id="bloodType" value="' + PiApp.esc(p.bloodType || '') + '" />' +
      '<label class="pi-label">الحالة الصحية</label><input class="pi-input" id="healthStatus" value="' + PiApp.esc(p.healthStatus || '') + '" />'
    ) : ''

    var doctorFields = role === 'DOCTOR' ? (
      '<label class="pi-label">نبذة</label><textarea class="pi-textarea" id="bio">' + PiApp.esc(p.bio || '') + '</textarea>' +
      '<label class="pi-label">سنوات الخبرة</label><input class="pi-input" id="yearsOfExperience" type="number" value="' + PiApp.esc(p.yearsOfExperience || '') + '" />'
    ) : ''

    main.innerHTML =
      '<div class="pi-card">' +
        (p.avatarUrl ? '<img class="pi-avatar" src="' + PiApp.esc(p.avatarUrl) + '" alt="" />' : '<div class="pi-avatar" style="line-height:72px;text-align:center;font-size:2rem">👤</div>') +
        '<p class="pi-muted" style="text-align:center">' + PiApp.esc(PiApp.roleLabel(role)) +
        (u.piUsername ? ' · @' + PiApp.esc(u.piUsername) : '') + '</p>' +
      '</div>' +
      '<form id="profileForm" class="pi-card">' +
        '<h2>البيانات الشخصية</h2>' +
        '<label class="pi-label">الاسم الأول</label><input class="pi-input" id="firstName" required value="' + PiApp.esc(p.firstName || '') + '" />' +
        '<label class="pi-label">اسم العائلة</label><input class="pi-input" id="lastName" value="' + PiApp.esc(p.lastName || '') + '" />' +
        '<label class="pi-label">الهاتف</label><input class="pi-input" id="phone" dir="ltr" value="' + PiApp.esc(p.phone || '') + '" />' +
        '<label class="pi-label">المدينة</label><input class="pi-input" id="city" value="' + PiApp.esc(p.city || '') + '" />' +
        doctorFields + healthFields +
        '<button class="pi-btn pi-btn-primary" type="submit" id="saveBtn">حفظ التغييرات</button>' +
        '<p id="msg"></p>' +
      '</form>' +
      renderPasswordSection()

    document.getElementById('profileForm').addEventListener('submit', saveProfile)
  }

  function renderPasswordSection() {
    if (!sessionData.user.email) return ''
    return '<div class="pi-card" id="pwdCard">' +
      '<h2>تغيير كلمة المرور</h2>' +
      '<label class="pi-label">كلمة المرور الحالية</label><input class="pi-input" id="curPwd" type="password" dir="ltr" />' +
      '<label class="pi-label">كلمة المرور الجديدة</label><input class="pi-input" id="newPwd" type="password" dir="ltr" />' +
      '<button class="pi-btn pi-btn-secondary" type="button" id="pwdBtn">تحديث كلمة المرور</button>' +
      '<p id="pwdMsg"></p></div>'
  }

  function saveProfile(e) {
    e.preventDefault()
    var btn = document.getElementById('saveBtn')
    var msg = document.getElementById('msg')
    btn.disabled = true
    msg.textContent = ''
    var body = {
      firstName: document.getElementById('firstName').value,
      lastName: document.getElementById('lastName').value,
      phone: document.getElementById('phone').value,
      city: document.getElementById('city').value,
    }
    var bioEl = document.getElementById('bio')
    if (bioEl) body.bio = bioEl.value
    var yoe = document.getElementById('yearsOfExperience')
    if (yoe && yoe.value) body.yearsOfExperience = Number(yoe.value)
    var bt = document.getElementById('bloodType')
    if (bt) body.bloodType = bt.value
    var hs = document.getElementById('healthStatus')
    if (hs) body.healthStatus = hs.value

    PiApp.api('/api/profile', { method: 'POST', body: body })
      .then(function (res) {
        if (res.data && res.data.error) throw new Error(res.data.message)
        msg.className = 'pi-ok'
        msg.textContent = 'تم الحفظ ✅'
      })
      .catch(function (err) {
        msg.className = 'pi-err'
        msg.textContent = err.message || 'فشل الحفظ'
      })
      .finally(function () { btn.disabled = false })
  }

  function bindPassword() {
    var pwdBtn = document.getElementById('pwdBtn')
    if (!pwdBtn) return
    pwdBtn.addEventListener('click', function () {
      var msg = document.getElementById('pwdMsg')
      msg.textContent = ''
      PiApp.api('/api/auth/change-password', {
        method: 'POST',
        body: {
          currentPassword: document.getElementById('curPwd').value,
          newPassword: document.getElementById('newPwd').value,
        },
      }).then(function (res) {
        if (res.data && res.data.error) throw new Error(res.data.message)
        msg.className = 'pi-ok'
        msg.textContent = 'تم تغيير كلمة المرور ✅'
      }).catch(function (e) {
        msg.className = 'pi-err'
        msg.textContent = e.message || 'فشل'
      })
    })
  }

  PiApp.requireSession().then(function (s) {
    if (!s) return
    sessionData = s
    var role = s.user.role
    if (role === 'OWNER' || role === 'ADMIN') {
      renderForm()
      bindPassword()
      return
    }
    PiApp.api('/api/profile').then(function (res) {
      profileData = (res.success && res.data) ? res.data : {}
      renderForm()
      bindPassword()
    }).catch(function () {
      profileData = {}
      renderForm()
      bindPassword()
    })
  })
  </script>
</body>
</html>
