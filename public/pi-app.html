<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MRI — الرئيسية</title>
  <link rel="stylesheet" href="/pi-shell.css" />
</head>
<body class="pi-app">
  <header class="pi-header">
    <h1>MRI</h1>
  </header>
  <main class="pi-main" id="main">
    <div class="pi-loading">جاري التحميل...</div>
  </main>
  <nav class="pi-nav" id="pi-nav"></nav>
  <script src="/pi-shell.js"></script>
  <script>
  PiApp.requireSession().then(function (session) {
    if (!session) return
    var u = session.user
    var main = document.getElementById('main')

    if (!u.isProfileComplete && u.role !== 'OWNER' && u.role !== 'ADMIN') {
      window.location.href = '/pi-select-role.html'
      return
    }

    PiApp.renderNav('home', u.role)

    var name = u.name || u.email || u.piUsername || 'بك'
    var links = [
      { href: '/pi-profile.html', label: 'الملف الشخصي', cls: 'pi-btn-primary', icon: '👤' },
      { href: PiApp.dashboardPath(u.role), label: u.role === 'OWNER' || u.role === 'ADMIN' ? 'لوحة الإدارة' : 'مواعيدي', cls: 'pi-btn-secondary', icon: '📅' },
      { href: '/pi-doctors.html', label: 'البحث عن أطباء', cls: 'pi-btn-secondary', icon: '👨‍⚕️' },
    ]

    main.innerHTML =
      '<div class="pi-card" style="text-align:center">' +
        '<p style="font-size:1.1rem;color:#fff;margin:0 0 4px">مرحباً ' + PiApp.esc(name) + '</p>' +
        '<span class="pi-badge">' + PiApp.esc(PiApp.roleLabel(u.role)) + '</span>' +
        (u.piUsername ? '<p class="pi-muted" style="margin-top:8px">@' + PiApp.esc(u.piUsername) + '</p>' : '') +
      '</div>' +
      links.map(function (l) {
        return '<a class="pi-btn ' + l.cls + '" href="' + l.href + '">' + l.icon + ' ' + l.label + '</a>'
      }).join('') +
      '<a class="pi-btn pi-btn-secondary" href="/api/auth/signout?callbackUrl=/">تسجيل الخروج</a>'
  })
  </script>
</body>
</html>
