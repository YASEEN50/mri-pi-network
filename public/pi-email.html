<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>دخول بالبريد — MRI</title>
  <link rel="stylesheet" href="/pi-login.css?v=2" />
</head>
<body class="pi-auth-page">
  <div class="pi-auth-medical" aria-hidden="true"></div>
  <div class="pi-auth-scrim" aria-hidden="true"></div>
  <div class="pi-auth-bg"></div>
  <div class="pi-auth-glow"></div>
  <div class="pi-auth-glow-orb"></div>

  <div class="pi-auth-wrap">
    <div class="pi-auth-brand">
      <div class="pi-auth-logo" aria-hidden="true">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
      </div>
      <h1 class="pi-auth-title">MRI</h1>
      <p class="pi-auth-subtitle">تسجيل الدخول بالبريد الإلكتروني</p>
    </div>

    <div class="pi-auth-card">
      <h2>مرحباً بعودتك</h2>
      <p class="pi-auth-hint">أدخل بيانات حسابك للمتابعة</p>

      <form id="form">
        <label class="pi-auth-label" for="email">البريد الإلكتروني</label>
        <div class="pi-auth-input-wrap">
          <input id="email" class="pi-auth-input" type="email" required autocomplete="email" dir="ltr" placeholder="example@email.com" />
        </div>

        <div class="pi-auth-row">
          <label class="pi-auth-label" for="password" style="margin:0">كلمة المرور</label>
          <a class="pi-auth-link" href="/forgot-password?site=full">نسيت كلمة المرور؟</a>
        </div>
        <div class="pi-auth-input-wrap">
          <input id="password" class="pi-auth-input has-toggle" type="password" required autocomplete="current-password" dir="ltr" placeholder="••••••••" />
          <button type="button" class="pi-auth-input-toggle" id="togglePwd" aria-label="إظهار كلمة المرور">👁</button>
        </div>

        <button class="pi-auth-btn pi-auth-btn-email" type="submit" id="submitBtn">تسجيل الدخول</button>
      </form>

      <div class="pi-auth-trust">
        <span>🔒 اتصال آمن</span>
        <span>✓ موثوق</span>
      </div>
    </div>

    <p id="err" class="pi-auth-error"></p>

    <a class="pi-auth-footer-link" href="/pi-register.html">ليس لديك حساب؟ <strong style="color:var(--pi-accent)">سجّل الآن</strong></a>
    <a class="pi-auth-back pi-auth-text-center" href="/" style="display:block">← العودة للرئيسية</a>
  </div>

  <script>
  function requestCookieAccess() {
    if (document.requestStorageAccess) {
      return document.requestStorageAccess().catch(function () {})
    }
    return Promise.resolve()
  }

  function verifySessionThenGo() {
    return fetch('/api/auth/session', { credentials: 'include', cache: 'no-store' })
      .then(function (r) { return r.json() })
      .then(function (s) {
        if (s && s.user) {
          window.location.href = '/dashboard'
          return
        }
        throw new Error('تم التحقق لكن الجلسة لم تُحفظ. أغلق التطبيق وافتحه من Pi مرة أخرى.')
      })
  }

  document.getElementById('togglePwd').addEventListener('click', function () {
    var input = document.getElementById('password')
    var show = input.type === 'password'
    input.type = show ? 'text' : 'password'
    this.textContent = show ? '🙈' : '👁'
  })

  document.getElementById('form').addEventListener('submit', function (e) {
    e.preventDefault()
    var btn = document.getElementById('submitBtn')
    var err = document.getElementById('err')
    err.textContent = ''
    btn.disabled = true
    btn.innerHTML = '<span class="pi-auth-spinner"></span> جاري الدخول...'
    requestCookieAccess()
      .then(function () { return fetch('/api/auth/csrf', { credentials: 'include' }) })
      .then(function (r) {
        if (!r.ok) throw new Error('تعذر الاتصال بالخادم (' + r.status + ')')
        return r.json()
      })
      .then(function (csrf) {
        return fetch('/api/auth/callback/credentials', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            csrfToken: csrf.csrfToken,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            callbackUrl: '/dashboard',
            json: 'true',
          }).toString(),
        })
      })
      .then(function (r) {
        return r.json().then(function (data) {
          if (!r.ok || data.error) {
            var msg = 'البريد أو كلمة المرور غير صحيحة'
            if (data.error === 'ACCOUNT_DISABLED') msg = 'تم تعليق هذا الحساب'
            throw new Error(msg)
          }
          return verifySessionThenGo()
        })
      })
      .catch(function (ex) {
        err.textContent = ex.message || 'حدث خطأ'
        btn.disabled = false
        btn.textContent = 'تسجيل الدخول'
      })
  })
  </script>
</body>
</html>
