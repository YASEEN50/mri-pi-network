<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تسجيل الدخول — MRI</title>
  <link rel="stylesheet" href="/pi-login.css?v=2" />
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script>
  (function () {
    function detectSandbox() {
      try {
        if (/sandbox\.minepi/i.test(location.hostname)) return true
        if (/\.pinet\.com$/i.test(location.hostname)) return false
      } catch (e) {}
      var mobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '')
      try { if (window.self !== window.top && !mobile) return true } catch (e) { if (!mobile) return true }
      return false
    }
    if (typeof Pi !== 'undefined') {
      window.__piInitPromise = Promise.resolve(Pi.init({ version: '2.0', sandbox: detectSandbox() }))
    }
  })()
  </script>
  <script src="/pi-auth.js"></script>
</head>
<body class="pi-auth-page">
  <div class="pi-auth-medical" aria-hidden="true"></div>
  <div class="pi-auth-scrim" aria-hidden="true"></div>
  <div class="pi-auth-bg"></div>
  <div class="pi-auth-glow"></div>
  <div class="pi-auth-glow-orb"></div>

  <div class="pi-auth-wrap">
    <div class="pi-auth-brand">
      <div class="pi-auth-logo" aria-hidden="true">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
      </div>
      <h1 class="pi-auth-title">MRI</h1>
      <p class="pi-auth-subtitle">تسجيل الدخول بـ Pi Network</p>
    </div>

    <div class="pi-auth-card">
      <h2>مرحباً بك</h2>
      <p id="hint" class="pi-auth-hint">اضغط الزر ووافق على طلب المصادقة في Pi Network</p>

      <button id="loginBtn" type="button" class="pi-auth-btn pi-auth-btn-pi">
        <span>π</span> تسجيل الدخول بـ Pi
      </button>

      <div class="pi-auth-divider">أو</div>

      <a href="/pi-email.html" class="pi-auth-btn pi-auth-btn-outline">📧 الدخول بالبريد الإلكتروني</a>
    <p class="pi-auth-hint" style="margin-top:12px;font-size:11px">لاختبار الأدوار المتعددة — استخدم البريد</p>

      <div class="pi-auth-trust">
        <span>🔒 اتصال آمن</span>
        <span>🟣 Pi Network</span>
        <span>✓ موثوق</span>
      </div>
    </div>

    <p id="err" class="pi-auth-error"></p>
    <a class="pi-auth-back pi-auth-text-center" href="/" style="display:block">← العودة للرئيسية</a>
  </div>

  <script>
  (function () {
    var btn = document.getElementById('loginBtn')
    var errEl = document.getElementById('err')
    var hintEl = document.getElementById('hint')

    function setLoading() {
      hintEl.className = 'pi-auth-hint loading pi-auth-status'
      hintEl.innerHTML = '<span class="pi-auth-spinner"></span> جاري تسجيل الدخول بـ Pi...'
    }

    function fail(msg) {
      errEl.textContent = msg
      btn.disabled = false
      btn.innerHTML = '<span>π</span> تسجيل الدخول بـ Pi'
      hintEl.className = 'pi-auth-hint'
      hintEl.textContent = 'اضغط الزر ووافق على طلب المصادقة في Pi Network'
    }

    btn.addEventListener('click', function () {
      errEl.textContent = ''
      btn.disabled = true
      btn.innerHTML = '<span class="pi-auth-spinner"></span> جاري التحقق...'
      setLoading()
      window.PiAuth.signIn().catch(function (e) {
        fail(e.message || 'حدث خطأ')
      })
    })

    window.PiAuth.runOnLoad().then(function (result) {
      if (result && result.mode === 'redirecting') {
        setLoading()
        hintEl.innerHTML = '<span class="pi-auth-spinner"></span> جلسة نشطة — جاري الدخول...'
      }
    }).catch(function () {
      hintEl.className = 'pi-auth-hint'
      hintEl.textContent = 'اضغط الزر ووافق على طلب المصادقة في Pi Network'
    })
  })()
  </script>
</body>
</html>
