<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تسجيل الدخول — MRI</title>
  <style>
    body { margin:0; padding:24px; background:#0f172a; color:#e2e8f0; font-family:Arial,Tahoma,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { width:100%; max-width:420px; background:#1e293b; border-radius:16px; padding:28px 22px; text-align:center; }
    h1 { font-size:1.2rem; color:#fff; margin:0 0 8px; }
    p { font-size:0.875rem; color:#94a3b8; margin:0 0 20px; line-height:1.5; }
    .btn { width:100%; padding:14px; border-radius:10px; border:none; font-size:1rem; font-weight:600; cursor:pointer; background:#7c3aed; color:#fff; margin-bottom:10px; }
    .btn:disabled { opacity:0.6; cursor:wait; }
    .btn2 { display:block; width:100%; padding:12px; border-radius:10px; background:#334155; color:#fff; text-decoration:none; font-size:0.9rem; box-sizing:border-box; }
    .err { color:#f87171; font-size:0.8rem; margin-top:12px; min-height:1.2em; }
    .back { display:inline-block; margin-top:14px; color:#94a3b8; font-size:0.85rem; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>تسجيل الدخول بـ Pi</h1>
    <p>اضغط الزر ووافق على طلب المصادقة في Pi Network</p>
    <button id="loginBtn" class="btn" type="button">π تسجيل الدخول</button>
    <a class="btn2" href="/pi-email.html">الدخول بالبريد الإلكتروني</a>
    <p id="err" class="err"></p>
    <a class="back" href="/">← الرئيسية</a>
  </div>
  <script>
  (function () {
    var btn = document.getElementById('loginBtn')
    var errEl = document.getElementById('err')

    function fail(msg) {
      errEl.textContent = msg
      btn.disabled = false
      btn.textContent = 'π تسجيل الدخول'
    }

    function timeout(ms, msg) {
      return new Promise(function (_, reject) {
        setTimeout(function () { reject(new Error(msg)) }, ms)
      })
    }

    function loadPiSdk() {
      if (window.Pi) return Promise.resolve()
      return new Promise(function (resolve, reject) {
        var s = document.createElement('script')
        s.src = 'https://sdk.minepi.com/pi-sdk.js'
        s.onload = resolve
        s.onerror = function () { reject(new Error('تعذر تحميل Pi SDK')) }
        document.head.appendChild(s)
      })
    }

    function getSandbox() {
      return fetch('/api/pi-config', { cache: 'no-store' })
        .then(function (r) { return r.json() })
        .then(function (d) { return d.sandbox !== false })
        .catch(function () { return true })
    }

    btn.addEventListener('click', function () {
      errEl.textContent = ''
      btn.disabled = true
      btn.textContent = 'جاري التحقق...'

      Promise.race([
        loadPiSdk()
          .then(getSandbox)
          .then(function (sandbox) {
            if (!window.Pi) throw new Error('Pi Browser غير متوفر')
            return window.Pi.init({ version: '2.0', sandbox: sandbox })
          })
          .then(function () {
            return window.Pi.authenticate(['username'], function () {})
          })
          .then(function (auth) {
            if (!auth || !auth.accessToken) throw new Error('لم يتم استلام رمز Pi')
            return fetch('/api/auth/csrf', { credentials: 'include' })
              .then(function (r) { return r.json() })
              .then(function (csrf) {
                return fetch('/api/auth/callback/pi-network', {
                  method: 'POST',
                  credentials: 'include',
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                  body: new URLSearchParams({
                    csrfToken: csrf.csrfToken,
                    accessToken: auth.accessToken,
                    callbackUrl: '/pi-app.html',
                    json: 'true',
                  }).toString(),
                })
              })
              .then(function (res) { return res.json() })
              .then(function (data) {
                if (data.error) throw new Error('فشل تسجيل الدخول — حاول مرة أخرى')
                window.location.href = data.url || '/pi-app.html'
              })
          }),
        timeout(45000, 'انتهت المهلة — وافق على طلب Pi أو أعد المحاولة')
      ]).catch(function (e) {
        fail(e.message || 'حدث خطأ')
      })
    })
  })()
  </script>
</body>
</html>
